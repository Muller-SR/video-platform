<!DOCTYPE html>
<html>
<head>
    <title>Video Platform</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f5f5f5;
            margin:0;
        }

        header{
            background:#222;
            color:white;
            padding:15px;
        }

        .container{
            max-width:800px;
            margin:auto;
            background:white;
            padding:20px;
            margin-top:20px;
            border-radius:6px;
        }

        a{
            color:#4a63ff;
            text-decoration:none;
        }

        button{
            background:#4a63ff;
            color:white;
            border:none;
            padding:10px 16px;
            border-radius:5px;
            cursor:pointer;
        }

        input, textarea{
            width:100%;
            padding:8px;
            margin-top:5px;
            margin-bottom:15px;
        }

    </style>
</head>

<body>

<header>
    <h2>Video Platform</h2>
</header>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
