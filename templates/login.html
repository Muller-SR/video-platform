<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            margin:0;
        }

        .container{
            max-width:400px;
            margin:auto;
            background:white;
            padding:25px;
            margin-top:100px;
            border-radius:6px;
            box-shadow:0 2px 6px rgba(0,0,0,0.1);
        }

        h2{
            text-align:center;
            margin-top:0;
        }

        input{
            width:100%;
            padding:8px;
            margin-top:5px;
            margin-bottom:15px;
        }

        button{
            background:#3b5cff;
            color:white;
            border:none;
            padding:10px;
            width:100%;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#2f49d1;
        }
    </style>

</head>

<body>

<div class="container">

<h2>Login</h2>

<form method="post">
    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">Entrar</button>
</form>

</div>

</body>
</html>
